name: Update Walking Data

on:
  push:
    paths:
      - 'pending.json'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge pending into walking-data.json
        run: |
          DATE=$(jq -r '.date' pending.json)
          KM=$(jq '.km' pending.json)
          jq --arg d "$DATE" --argjson k "$KM" '.[$d] = $k' walking-data.json > tmp.json
          mv tmp.json walking-data.json

      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add walking-data.json
          git diff --staged --quiet || git commit -m "걷기 기록: $DATE (${KM}km)"
          git push
