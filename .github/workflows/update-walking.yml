name: Update Walking Data

on:
  repository_dispatch:
    types: [update-walking]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update walking-data.json
        run: |
          DATE="${{ github.event.client_payload.date }}"
          KM="${{ github.event.client_payload.km }}"
          jq --arg d "$DATE" --argjson k "$KM" '.[$d] = $k' walking-data.json > tmp.json
          mv tmp.json walking-data.json

      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add walking-data.json
          git diff --staged --quiet || git commit -m "걷기 기록 업데이트: ${{ github.event.client_payload.date }} (${{ github.event.client_payload.km }}km)"
          git push
