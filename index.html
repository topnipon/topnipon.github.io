<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>땡굴이의 발자국 · 대한민국 여행 아카이브</title>
<meta name="description" content="대한민국 302곳의 여행지를 기록하는 개인 아카이브. 방문한 곳을 지도 위에 발자국으로 남깁니다.">
<meta name="theme-color" content="#0d1117">
<meta property="og:title" content="땡굴이의 발자국">
<meta property="og:description" content="대한민국 302곳의 여행지를 기록하는 개인 여행 아카이브">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👣</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;
  --surface:#111827;
  --surface2:#161b22;
  --surface3:#0d1117;
  --border:#21262d;
  --border2:#30363d;
  --text:#e2e8f4;
  --text2:#8899b8;
  --accent:#f6ad55;
  --c-mountain:#34d399;
  --c-hiking:#a3cb38;
  --c-beach:#60a5fa;
  --c-history:#fbbf24;
  --c-city:#a78bfa;
  --c-island:#22d3ee;
  --c-nature:#86efac;
  --c-unique:#f472b6;
  --c-theme:#ff6b35;
  --c-resort:#00b4d8;
  --c-park:#52b788;
  --c-temple:#e76f51;
  --c-museum:#457b9d;
  /* ── 디자인 시스템 토큰 ── */
  --sp-xs:6px;  --sp-sm:10px; --sp-md:16px; --sp-lg:24px; --sp-xl:32px;
  --r-sm:8px;   --r-md:12px;  --r-lg:16px;  --r-full:9999px;
  --t-fast:0.15s ease; --t-normal:0.2s ease; --t-slow:0.35s ease;
  --sh-sm:0 2px 8px rgba(0,0,0,.3);
  --sh-md:0 4px 16px rgba(0,0,0,.4);
  --sh-lg:0 8px 32px rgba(0,0,0,.5);
  --z-map:0; --z-overlay:800; --z-ui:900; --z-panel:950; --z-nav:1000; --z-modal:2000; --z-toast:3000;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif}

/* 공통 상단 네비게이션 */
#topnav{
  position:fixed;top:0;left:0;right:0;z-index:1000;height:57px;
  background:rgba(13,17,23,0.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:0;
}
#nav-brand{
  font-size:0.92rem;font-weight:800;color:var(--accent);
  white-space:nowrap;letter-spacing:.5px;margin-right:20px;flex-shrink:0;
}
#nav-tabs{display:flex;gap:4px;align-items:center}
.nav-tab{
  font-size:0.75rem;padding:6px 16px;border-radius:20px;
  text-decoration:none;color:var(--text2);border:1px solid transparent;
  transition:all .2s;white-space:nowrap;
}
.nav-tab:hover{color:var(--text);border-color:var(--border2)}
.nav-tab.active{
  background:rgba(246,173,85,0.12);border-color:var(--accent);
  color:var(--accent);font-weight:700;
}
#nav-right{display:flex;align-items:center;gap:16px;margin-left:auto;flex:1;max-width:420px}
@media(max-width:640px){#hd-prog{display:none}#nav-brand{font-size:0.82rem;margin-right:12px}}

/* 지도 */
#map{position:fixed;top:57px;left:0;right:0;bottom:0}
.leaflet-tile{filter:brightness(0.88) saturate(0.75)}
.leaflet-control-zoom{display:none}
.leaflet-control-attribution{display:none}

/* 필터 바 */
#filters{
  position:fixed;top:69px;left:50%;transform:translateX(-50%);z-index:900;
  display:flex;gap:6px;padding:8px 14px;
  background:rgba(13,17,23,0.94);backdrop-filter:blur(14px);
  border:1px solid var(--border);border-radius:var(--r-full);
}

/* 범례 */
#legend{
  position:fixed;bottom:24px;left:20px;z-index:900;
  background:rgba(13,17,23,0.92);backdrop-filter:blur(14px);
  border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;
  min-width:150px;max-width:190px;
}
#legend-tabs{display:flex;gap:4px;margin-bottom:8px}
.leg-tab{flex:1;font-size:0.62rem;padding:3px 0;border-radius:10px;border:1px solid transparent;
  background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;letter-spacing:.3px}
.leg-tab.active{background:rgba(246,173,85,0.12);border-color:var(--accent);color:var(--accent);font-weight:700}
#legend-cat-panel{display:flex;flex-direction:column;gap:5px}
#legend-region-panel{display:none;flex-direction:column;gap:6px}
#legend-region-panel.show{display:flex}
.leg-row{display:flex;align-items:center;gap:7px;font-size:0.7rem;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rg-row{display:flex;flex-direction:column;gap:3px}
.rg-hdr{display:flex;justify-content:space-between;align-items:baseline}
.rg-name{font-size:0.68rem;color:var(--text2)}
.rg-pct{font-size:0.6rem;color:var(--accent);font-weight:700;white-space:nowrap;margin-left:6px}
.rg-bar{height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.rg-fill{height:100%;background:linear-gradient(90deg,var(--accent),#f6d55f);border-radius:2px;transition:width .5s ease;width:0%}

/* 스팟 상세 패널 */
#panel{
  position:fixed;top:57px;right:0;bottom:0;width:300px;z-index:950;
  background:var(--surface);border-left:1px solid var(--border);
  box-shadow:-8px 0 32px rgba(0,0,0,0.45);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
}
#panel.open{transform:translateX(0)}
#panel-close{
  position:absolute;top:14px;right:14px;background:transparent;border:none;
  color:var(--text2);font-size:1.1rem;cursor:pointer;padding:4px;line-height:1;
}
#panel-close:hover{color:var(--text)}
#panel-mascot{
  position:absolute;top:16px;right:48px;width:70px;height:70px;object-fit:contain;
  pointer-events:none;filter:drop-shadow(0 8px 18px rgba(0,0,0,.45));
  opacity:.95;
}
#panel-body{padding:22px 20px 24px;overflow-y:auto;flex:1}
/* 패널 정보 계층: 장소명 → 카테고리+지역 → 설명 */
#panel-name{font-size:1.5rem;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:10px;padding-right:76px}
.panel-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
#panel-cat{
  display:inline-flex;align-items:center;font-size:0.6rem;letter-spacing:1.5px;
  text-transform:uppercase;padding:3px 9px;border-radius:20px;font-weight:700;
  color:#0d1117;flex-shrink:0;
}
#panel-region{font-size:0.72rem;color:var(--text2)}
#panel-desc{font-size:0.8rem;color:var(--text2);line-height:1.7;margin-bottom:18px}
#panel-stamp{
  width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;margin:0 auto 20px;border:3px solid var(--border2);background:var(--surface2);
  transition:all .4s ease;
}
#panel-stamp.visited{
  width:112px;height:112px;border:none;background:transparent;box-shadow:none;margin-bottom:12px;
}
#panel-stamp img{width:100%;height:100%;object-fit:contain;display:block;filter:drop-shadow(0 10px 18px rgba(0,0,0,.35))}
#panel-btn{
  display:block;width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;
  font-size:0.85rem;font-weight:700;letter-spacing:.5px;transition:all .25s;
}
#panel-btn.unvisited{
  background:var(--surface2);border:1px solid var(--border2);color:var(--text2);
}
#panel-btn.unvisited:hover{border-color:var(--accent);color:var(--accent)}
#panel-btn.done{color:var(--bg);font-weight:800}

/* 설정 버튼 */
#settings-btn{
  position:fixed;bottom:24px;right:24px;z-index:900;width:42px;height:42px;
  border-radius:50%;background:var(--surface2);border:1px solid var(--border2);
  color:var(--text2);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
#settings-btn:hover{border-color:var(--accent);color:var(--accent)}

/* 설정 모달 */
#settings-overlay{
  position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);
  display:none;align-items:center;justify-content:center;
}
#settings-overlay.open{display:flex}
#settings-box{
  background:var(--surface);border:1px solid var(--border2);border-radius:16px;
  padding:28px 28px 24px;width:360px;max-width:90vw;
}
#settings-box h3{font-size:1rem;font-weight:700;margin-bottom:8px}
#settings-box .s-desc{font-size:0.75rem;color:var(--text2);margin-bottom:18px;line-height:1.6}
#settings-box label{font-size:0.72rem;color:var(--text2);display:block;margin-bottom:6px}
#settings-box input{
  width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-size:0.82rem;outline:none;
}
#settings-box input:focus{border-color:var(--accent)}
#settings-actions{display:flex;gap:8px;margin-top:16px}
#settings-save{
  flex:1;padding:10px;background:var(--accent);border:none;border-radius:8px;
  color:#0a0d14;font-weight:700;cursor:pointer;font-size:0.82rem;
}
#settings-cancel{
  padding:10px 16px;background:transparent;border:1px solid var(--border2);
  border-radius:8px;color:var(--text2);cursor:pointer;font-size:0.82rem;
}
#settings-note{font-size:0.7rem;color:var(--text2);margin-top:12px;line-height:1.5}
#sync-all-btn{
  width:100%;margin-top:10px;padding:9px;background:transparent;
  border:1px solid var(--accent);border-radius:8px;color:var(--accent);
  cursor:pointer;font-size:0.78rem;font-weight:600;
}
#sync-all-btn:hover{background:rgba(246,173,85,0.1)}
#sync-status{font-size:0.7rem;margin-top:8px;line-height:1.5;min-height:1em}

/* 툴팁 */
.spot-tip{
  background:rgba(13,17,23,0.95)!important;border:1px solid var(--border2)!important;
  border-radius:8px!important;padding:7px 11px!important;color:var(--text)!important;
  font-size:0.75rem!important;box-shadow:0 4px 16px rgba(0,0,0,.5)!important;
}
.spot-tip::before{display:none!important}
.spot-tip b{display:block;font-size:0.82rem;margin-bottom:2px}
.spot-tip small{color:var(--text2)}

/* 모바일 */
@media(max-width:640px){
  #filters{
    top:auto;bottom:70px;left:10px;right:10px;transform:none;
    border-radius:14px;flex-direction:column;gap:4px;
  }
  #fl1{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  #fl2{overflow-x:auto;-webkit-overflow-scrolling:touch}
  #panel{
    width:100%;top:auto;height:72vh;bottom:0;left:0;right:0;
    border-left:none;border-top:1px solid var(--border);
    border-radius:16px 16px 0 0;
    transform:translateY(100%);
  }
  #panel.open{transform:translateY(0)}
  #legend{display:none}
  #hd-prog{gap:6px}
  #prog-label{font-size:0.78rem}
  #prog-count{font-size:0.62rem}
}

/* ─── 헤더 진행률 (간결 버전) ─── */
#hd-prog{display:flex;align-items:center;gap:10px;width:100%}
#prog-label{font-size:0.85rem;font-weight:800;color:var(--accent);white-space:nowrap}
#prog-count{font-size:0.68rem;color:var(--text2);white-space:nowrap}
#prog-bar{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden;min-width:60px}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#f6d55f);border-radius:2px;transition:width .6s ease;width:0%}

/* ─── 2단계 필터 ─── */
#filters{
  position:fixed;top:69px;left:50%;transform:translateX(-50%);z-index:900;
  display:flex;flex-direction:column;gap:5px;padding:8px 12px;
  background:rgba(13,17,23,0.94);backdrop-filter:blur(14px);
  border:1px solid var(--border);border-radius:16px;
}
#fl1{display:flex;gap:5px;align-items:center}
#fl2{display:none;gap:5px;flex-wrap:wrap}
#fl2.show{display:flex}
.fl1-btn{
  font-size:0.7rem;padding:5px 13px;border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--text2);cursor:pointer;transition:all .18s;white-space:nowrap;
}
.fl1-btn:hover{color:var(--text);border-color:var(--text2)}
.fl1-btn.active{background:rgba(246,173,85,0.15);border-color:var(--accent);color:var(--accent);font-weight:700}
.fl2-btn{
  font-size:0.65rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--text2);cursor:pointer;transition:all .18s;white-space:nowrap;
}
.fl2-btn:hover{color:var(--text);border-color:var(--text2)}
.fl2-btn.active{font-weight:700}
#search-toggle{padding:5px 10px;font-size:0.82rem}
#search-toggle.active{border-color:var(--accent);color:var(--accent)}

/* 검색 박스 */
#search-wrap{padding:4px 0 2px;display:none}
#search-wrap.show{display:block}
#search-inp{
  width:100%;padding:7px 12px;background:var(--bg);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-size:0.8rem;outline:none;min-width:200px;
}
#search-inp:focus{border-color:var(--accent)}
#search-res{
  position:absolute;top:100%;left:0;right:0;margin-top:4px;
  background:rgba(13,17,23,0.97);border:1px solid var(--border2);border-radius:var(--r-sm);
  max-height:240px;overflow-y:auto;z-index:910;
}
.sr-item{
  padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);transition:background .15s;
}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:rgba(246,173,85,0.08)}
.sr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sr-name{font-size:0.8rem;color:var(--text);font-weight:600}
.sr-meta{font-size:0.65rem;color:var(--text2);margin-top:1px}

/* ─── MarkerCluster 커스텀 ─── */
.custom-cluster{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;color:var(--accent);
  background:rgba(13,17,23,0.90);border:1.5px solid rgba(246,173,85,0.45);
  backdrop-filter:blur(8px);
  box-shadow:var(--sh-sm);
  transition:border-color var(--t-normal),box-shadow var(--t-normal);
}
.custom-cluster:hover{border-color:rgba(246,173,85,0.75);box-shadow:var(--sh-md)}
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:none!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{display:none!important}

/* ─── 근처 스팟 ─── */
#nearby-section{margin-bottom:18px}
.nearby-title{font-size:0.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:8px;font-weight:700}
.nearby-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;
  background:var(--surface2);margin-bottom:5px;cursor:pointer;transition:background .15s;
}
.nearby-item:hover{background:var(--border)}
.nearby-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.nearby-name{font-size:0.78rem;color:var(--text);font-weight:600;flex:1}
.nearby-dist{font-size:0.65rem;color:var(--text2)}

/* ─── Google Maps 버튼 (패널 내) ─── */
#panel-map-open{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:9px;border-radius:8px;border:1px solid var(--border2);
  background:transparent;color:var(--text2);font-size:0.75rem;font-weight:600;
  text-decoration:none;cursor:pointer;transition:all .2s;margin-bottom:18px;
}
#panel-map-open:hover{border-color:#4285F4;color:#4285F4;background:rgba(66,133,244,0.08)}

/* ─── 업적 토스트 ─── */
#ach-toast-wrap{position:fixed;top:80px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.ach-toast{
  background:rgba(15,20,32,0.95);border:1px solid var(--accent);border-radius:12px;
  padding:10px 14px;display:flex;align-items:center;gap:10px;pointer-events:none;
  backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(0,0,0,.5);
  animation:ach-in .35s ease, ach-out .4s ease 3.2s forwards;
  min-width:200px;
}
.ach-emoji{font-size:1.4rem}
.ach-text b{display:block;font-size:0.8rem;color:var(--accent)}
.ach-text small{font-size:0.68rem;color:var(--text2)}
@keyframes ach-in{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes ach-out{to{transform:translateX(120%);opacity:0}}

/* ─── 인트로 페이드 애니메이션 ─── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#topnav{animation:fadeDown .42s ease both}
#filters{animation:fadeDown .48s .1s ease both}
#legend{animation:fadeUp .48s .2s ease both}

/* ─── 마커 호버 상태 ─── */
.spot-icon:hover>div{filter:brightness(1.4)!important}

/* ─── 패널 히어로 스트라이프 ─── */
#panel-hero{height:5px;flex-shrink:0;background:var(--accent);transition:background var(--t-normal)}

/* ─── 범례 컴팩트 ─── */
#legend{min-width:140px;max-width:175px}
#legend-cat-panel{display:flex;flex-direction:column;gap:4px}
.leg-row{font-size:0.64rem;gap:5px}
.leg-count{margin-left:auto;font-size:0.58rem;color:var(--accent);font-weight:700}

/* ─── 필터 액티브 강조 ─── */
.fl1-btn.active{
  background:rgba(246,173,85,0.15);border-color:var(--accent);
  color:var(--accent);font-weight:700;
}

/* ─── 스탬프 방문 애니메이션 ─── */
@keyframes stampPop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
#panel-stamp.pop{animation:stampPop .4s ease}

/* ─── 검색 키보드 포커스 ─── */
.sr-item.focused{background:rgba(246,173,85,0.12)}

/* ─── 범례 fade (지도 주인공 유지) ─── */
#legend{opacity:0.68;transition:opacity .25s ease}
#legend:hover{opacity:1}

/* ─── 필터 바 subtle ─── */
#filters{border-color:rgba(33,38,45,0.7)}

/* ─── empty state ─── */
#map-empty{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:800;
  text-align:center;pointer-events:none;opacity:0;transition:opacity .35s ease;
}
#map-empty.show{opacity:1}
#map-empty-mascot{width:118px;height:118px;object-fit:contain;margin:0 auto 8px;filter:drop-shadow(0 12px 28px rgba(0,0,0,.45));opacity:.88}
#map-empty-msg{font-size:0.88rem;color:var(--text2);font-weight:600;margin-bottom:5px}
#map-empty-sub{font-size:0.72rem;color:var(--border2)}

/* ─── 오너 인증 모달 ─── */
#owner-modal{
  position:fixed;inset:0;z-index:var(--z-modal);
  background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s ease;
}
#owner-modal.open{opacity:1;pointer-events:all}
#owner-box{
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);
  padding:28px 24px;width:260px;text-align:center;box-shadow:var(--sh-lg);
}
#owner-box h4{font-size:0.9rem;color:var(--text);margin-bottom:16px;font-weight:700}
#owner-pw{
  width:100%;padding:10px 12px;border-radius:var(--r-sm);
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text);font-size:1rem;text-align:center;letter-spacing:6px;
  outline:none;margin-bottom:8px;box-sizing:border-box;
}
#owner-pw:focus{border-color:var(--accent)}
#owner-err{font-size:0.72rem;color:#f87171;min-height:1em;margin-bottom:10px}
#owner-confirm{
  width:100%;padding:10px;border-radius:var(--r-sm);border:none;
  background:var(--accent);color:var(--bg);font-weight:700;font-size:0.85rem;cursor:pointer;
  transition:opacity .15s;
}
#owner-confirm:hover{opacity:0.85}

/* ─── 검색 클리어 버튼 ─── */
#search-clear{
  position:absolute;right:9px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text2);cursor:pointer;
  font-size:0.72rem;padding:3px 5px;display:none;
  transition:color .2s ease;line-height:1;
}
#search-clear:hover{color:var(--text)}
#search-wrap.has-text #search-clear{display:block}
#search-wrap.has-text #search-inp{padding-right:28px}

/* ─── 선택 색상 + 포커스 접근성 ─── */
::selection{background:rgba(246,173,85,0.22);color:var(--text)}
*:focus-visible{outline:2px solid rgba(246,173,85,0.6);outline-offset:2px;border-radius:3px}

/* ─── prefers-reduced-motion ─── */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
  #topnav,#filters,#legend{animation:none!important}
}

/* ─── 모바일 안전 영역 ─── */
@media(max-width:640px){
  #panel{padding-bottom:env(safe-area-inset-bottom)}
  #filters{padding-bottom:calc(8px + env(safe-area-inset-bottom))}
  .fl1-btn,.fl2-btn{min-height:36px;padding-top:7px;padding-bottom:7px}
}

/* ─── 모바일 사용성 보정: 마지막 선언으로 이전 기본값을 확실히 덮어쓴다 ─── */
@media(max-width:640px){
  html,body{height:100dvh}
  #topnav{
    min-height:104px;height:auto;padding:8px 12px 9px;gap:8px;flex-wrap:wrap;
    align-content:center;
  }
  #nav-brand{font-size:0.78rem;margin-right:4px;max-width:34%;overflow:hidden;text-overflow:ellipsis}
  #nav-tabs{margin-left:auto;gap:5px}
  .nav-tab{font-size:0.72rem;padding:6px 10px}
  #nav-right{
    order:3;width:100%;max-width:none;margin-left:0;flex:0 0 100%;
    gap:8px;
  }
  #hd-prog{display:flex;gap:8px;width:100%;align-items:center}
  #prog-label{font-size:0.76rem;min-width:max-content}
  #prog-pct{font-size:0.86rem}
  #prog-count{font-size:0.66rem}
  #prog-bar{min-width:34px}

  #map{top:104px;bottom:0}

  #filters{
    top:auto!important;left:12px!important;right:12px!important;bottom:calc(14px + env(safe-area-inset-bottom))!important;
    transform:none!important;width:auto;max-width:none;max-height:34dvh;overflow:visible;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom));border-radius:16px;
    box-shadow:0 10px 34px rgba(0,0,0,.45);
  }
  #fl1{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
  #fl1::-webkit-scrollbar,#fl2::-webkit-scrollbar{display:none}
  #fl2{
    flex-wrap:nowrap;overflow-x:auto;max-width:100%;padding-bottom:2px;
    -webkit-overflow-scrolling:touch;
  }
  #search-wrap{position:relative;padding-top:5px}
  #search-inp{min-width:0;height:40px;font-size:16px}
  #search-res{position:fixed;left:12px;right:12px;top:auto;bottom:calc(82px + env(safe-area-inset-bottom));max-height:42dvh}

  #panel{
    width:100%;top:auto;left:0;right:0;bottom:0;height:auto;max-height:68dvh;
    border-left:none;border-top:1px solid var(--border2);border-radius:18px 18px 0 0;
    transform:translateY(105%);box-shadow:0 -16px 40px rgba(0,0,0,.55);
  }
  #panel.open{transform:translateY(0)}
  #panel-body{padding:18px 18px calc(18px + env(safe-area-inset-bottom));max-height:calc(68dvh - 5px)}
  #panel-name{font-size:1.25rem;padding-right:70px;margin-bottom:8px}
  #panel-mascot{width:58px;height:58px;right:46px;top:14px}
  #panel-close{top:13px;right:13px;width:34px;height:34px;border-radius:50%;background:rgba(13,17,23,.45)}
  #panel-desc{font-size:0.82rem;margin-bottom:12px}
  #nearby-section{margin-bottom:12px}
  #panel-stamp{width:58px;height:58px;font-size:1.75rem;margin-bottom:12px}
  #panel-stamp.visited{width:86px;height:86px;margin-bottom:8px}
  #panel-btn{min-height:48px;font-size:0.9rem}
  body.panel-open #filters{opacity:0;pointer-events:none;transform:translateY(10px)!important}
  body.panel-open #settings-btn{opacity:0;pointer-events:none}
  #settings-btn{
    right:14px;bottom:calc(14px + env(safe-area-inset-bottom));width:44px;height:44px;
  }
  #settings-box{width:calc(100vw - 28px);max-width:360px;padding:22px 18px}
  #owner-box{width:calc(100vw - 48px);max-width:300px}
}
</style>

<script>
const OWNER_HASH = '3c5d8ca315f8c36d4cd4beecbc55b34c92a2d6eb1df730908df6f23dd2aa08f7';

const CAT_COLOR = {
  mountain:'#34d399', beach:'#60a5fa', history:'#fbbf24',
  city:'#a78bfa', island:'#22d3ee', nature:'#86efac', unique:'#f472b6', hiking:'#a3cb38',
  theme:'#ff6b35', resort:'#00b4d8',
  park:'#52b788', temple:'#e76f51', museum:'#457b9d'
};
const CAT_LABEL = {
  mountain:'산/자연', beach:'해변', history:'역사/문화',
  city:'도시', island:'섬', nature:'자연', unique:'특별', hiking:'트래킹',
  theme:'놀이동산', resort:'리조트',
  park:'공원', temple:'사찰', museum:'박물관'
};
const CAT_EMOJI = {
  mountain:'⛰️', beach:'🏖️', history:'🏯',
  city:'🏙️', island:'🏝️', nature:'🌿', unique:'✨', hiking:'🥾',
  theme:'🎢', resort:'🏨',
  park:'🌳', temple:'🛕', museum:'🏛️'
};
const REPO = 'topnipon/topnipon.github.io';
const SPOTS_DATA_URL = 'data/travel-spots.json';

let spotsData = [], visitedSet = new Set();
let activeTheme = 'all', activeRegion = null;
let markerMap = {}, selectedSpot = null, lastSelectedId = null;
let map, regionLayer, clusterGroup, fuseSearch;

// 지역별 색상 (시도 코드 → 지역명 매핑)
const CODE_TO_REGION = {
  '11':'서울','21':'부산','22':'대구','23':'인천','24':'광주',
  '25':'대전','26':'울산','29':'세종','31':'경기','32':'강원',
  '33':'충북','34':'충남','35':'전북','36':'전남','37':'경북',
  '38':'경남','39':'제주'
};
const REGION_COLOR = {
  '서울':'#FF6B6B','경기':'#FFAA00','인천':'#FECA57','강원':'#48DBFB',
  '충북':'#FF9FF3','충남':'#54A0FF','대전':'#A29BFE','전북':'#00D2D3',
  '전남':'#1DD1A1','광주':'#26de81','경북':'#F368E0','경남':'#EE5A24',
  '대구':'#fd9644','부산':'#0652DD','울산':'#9980FA','제주':'#6C5CE7','세종':'#00cec9'
};

async function loadTravelSpots() {
  const res = await fetch(`${SPOTS_DATA_URL}?v=${Date.now()}`);
  if (!res.ok) throw new Error(`여행지 데이터 로드 실패: ${res.status}`);
  const data = await res.json();
  if (!Array.isArray(data.spots)) throw new Error('여행지 데이터 형식이 올바르지 않습니다.');
  return data.spots;
}

async function init() {
  const KR_BOUNDS = L.latLngBounds([33.0, 124.5], [38.65, 132.2]);
  const KR_FIT    = L.latLngBounds([33.1, 125.8], [38.5, 129.6]);
  map = L.map('map', {
    zoomControl:false, attributionControl:false,
    maxBounds: KR_BOUNDS,
    maxBoundsViscosity: 1.0,
    minZoom: 8
  });
  map.fitBounds(KR_FIT, {padding:[10,10]});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {subdomains:'abcd', maxZoom:19}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);

  // MarkerCluster 초기화
  clusterGroup = L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 48,
    spiderfyOnMaxZoom: true,
    iconCreateFunction: cluster => {
      const n = cluster.getChildCount();
      const size = n < 10 ? 36 : n < 50 ? 44 : 54;
      const fs = n < 10 ? '0.75rem' : n < 50 ? '0.8rem' : '0.88rem';
      return L.divIcon({
        html: `<div class="custom-cluster" style="width:${size}px;height:${size}px;font-size:${fs}">${n}</div>`,
        className: '', iconSize:[size,size], iconAnchor:[size/2,size/2]
      });
    }
  });
  clusterGroup.addTo(map);

  try {
    spotsData = await loadTravelSpots();
  } catch (e) {
    console.error(e);
    alert('여행지 데이터를 불러오지 못했습니다. 로컬에서는 HTTP 서버로 실행한 뒤 접속해 주세요.');
    return;
  }
  fuseSearch = new Fuse(spotsData, { keys:['name','region'], threshold:0.35, includeScore:true });

  try {
    if (location.protocol !== 'file:') {
      const vr = await fetch('data/visited-spots.json?v='+Date.now());
      const vd = await vr.json();
      (vd.visited || []).forEach(id => visitedSet.add(id));
    }
  } catch(e) {}
  renderSpots();
  updateStats();
  bindEvents();

  // 지역 GeoJSON 오버레이 (서버에서만)
  if (location.protocol !== 'file:') {
    fetch('data/korea-regions.json')
      .then(r => r.json())
      .then(geo => {
        regionLayer = L.geoJSON(geo, {
          style: f => regionStyle(f),
          onEachFeature: (f, layer) => {
            const regionName = CODE_TO_REGION[(f.properties.code||'').substring(0,2)];
            layer.on('click', e => {
              L.DomEvent.stopPropagation(e);
              if (!regionName) return;
              // 지역 클릭 → 해당 지역 필터
              activeRegion = activeRegion === regionName ? null : regionName;
              activeTheme = 'all';
              // fl1 버튼 상태 업데이트
              document.querySelectorAll('.fl1-btn[data-mode]').forEach(b=>b.classList.remove('active'));
              const regionBtn = document.querySelector('.fl1-btn[data-mode="region"]');
              if (regionBtn) regionBtn.classList.toggle('active', !!activeRegion);
              if (!activeRegion) document.querySelector('.fl1-btn[data-mode="all"]').classList.add('active');
              buildFL2('region');
              closePanel(); renderSpots();
            });
            layer.on('mouseover', function(e) {
              if (regionName) layer.setStyle({ weight:2, opacity:0.9 });
            });
            layer.on('mouseout', function(e) {
              regionLayer.resetStyle(layer);
            });
          }
        });
        regionLayer.addTo(map);
        regionLayer.bringToBack();
      })
      .catch(() => {});
  }
}

function spotRadius(spot) {
  if (spot.radius >= 12000) return 22;
  if (spot.radius >= 8000)  return 18;
  if (spot.radius >= 5000)  return 15;
  if (spot.radius >= 3000)  return 12;
  if (spot.radius >= 1500)  return 10;
  return 8;
}

function makeSpotIcon(spot, isVisited, isSelected) {
  const col = CAT_COLOR[spot.category] || '#888';
  const r = spotRadius(spot);
  const size = r * 2;
  let inner;
  if (isVisited) {
    const glow = isSelected
      ? `box-shadow:0 0 0 2px ${col}50,0 0 10px ${col}90;transform:scale(1.3);`
      : `box-shadow:0 0 4px ${col}60;`;
    inner = `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${col};opacity:0.85;border:2px solid ${col};${glow};transition:all .2s"></div>`;
  } else {
    const glow = isSelected ? `box-shadow:0 0 7px ${col}70;transform:scale(1.18);` : '';
    inner = `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${col}20;border:1.5px solid ${col}BB;${glow};transition:all .2s"></div>`;
  }
  return L.divIcon({ html:inner, className:'spot-icon', iconSize:[size,size], iconAnchor:[size/2,size/2] });
}

function renderSpots() {
  clusterGroup.clearLayers();
  markerMap = {};
  let count = 0;
  spotsData.forEach(spot => {
    if (activeTheme !== 'all' && spot.category !== activeTheme) return;
    if (activeRegion && spot.region !== activeRegion) return;
    const v = visitedSet.has(spot.id);
    const sel = spot.id === lastSelectedId;
    const m = L.marker([spot.lat, spot.lng], { icon: makeSpotIcon(spot, v, sel) });
    m.bindTooltip(
      `<b>${spot.name}</b><small>${CAT_LABEL[spot.category]} · ${spot.region}</small>`,
      { direction:'top', sticky:true, className:'spot-tip', offset:[0,-6] }
    );
    m.on('click', e => { L.DomEvent.stopPropagation(e); openPanel(spot); });
    clusterGroup.addLayer(m);
    markerMap[spot.id] = m;
    count++;
  });
  // empty state
  const emptyEl = document.getElementById('map-empty');
  if (emptyEl) {
    const filtered = activeTheme !== 'all' || activeRegion;
    emptyEl.classList.toggle('show', filtered && count === 0);
    if (filtered && count === 0) {
      document.getElementById('map-empty-msg').textContent =
        activeRegion ? `${activeRegion}에 아직 발자국이 없습니다` : '아직 이 테마의 발자국은 없습니다';
    }
  }
}

function regionStyle(f) {
  const code = (f.properties.code || '').substring(0, 2);
  const region = CODE_TO_REGION[code];
  const color = REGION_COLOR[region] || '#636e72';
  const regionMap = {};
  spotsData.forEach(s => {
    if (!regionMap[s.region]) regionMap[s.region] = {total:0, visited:0};
    regionMap[s.region].total++;
    if (visitedSet.has(s.id)) regionMap[s.region].visited++;
  });
  const d = region ? (regionMap[region] || {total:0, visited:0}) : {total:0, visited:0};
  const pct = d.total ? d.visited / d.total : 0;
  const fillOpacity = 0.10 + pct * 0.40;
  return {
    fillColor: color,
    fillOpacity,
    color: color,
    weight: 0.8,
    opacity: 0.45
  };
}

// ─── 헬퍼: 거리 계산 ───
function haversine(a, b) {
  const R=6371, d2r=Math.PI/180;
  const dLat=(b.lat-a.lat)*d2r, dLng=(b.lng-a.lng)*d2r;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*d2r)*Math.cos(b.lat*d2r)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function getNearbySpots(spot, n=3) {
  return spotsData
    .filter(s => s.id !== spot.id)
    .map(s => ({...s, dist:haversine(spot, s)}))
    .sort((a,b) => a.dist-b.dist)
    .slice(0, n);
}

function showAchToast(a) {

function updateStats() {
  const total = spotsData.length;
  const n = visitedSet.size;
  const pct = total ? Math.round(n/total*100) : 0;
  document.getElementById('prog-visited').textContent = n;
  document.getElementById('prog-total').textContent = total;
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';
  updateRegionStats();
  updateLegendCounts();
  if (regionLayer) regionLayer.setStyle(f => regionStyle(f));
}

function updateLegendCounts() {
  const catCount = {};
  spotsData.forEach(s => { catCount[s.category] = (catCount[s.category]||0) + 1; });
  Object.entries(catCount).forEach(([cat, cnt]) => {
    const el = document.getElementById('lc-'+cat);
    if (el) el.textContent = cnt;
  });
  const panel = document.getElementById('legend-cat-panel');
  Array.from(panel.querySelectorAll('.leg-row'))
    .sort((a, b) => parseInt(b.querySelector('.leg-count')?.textContent||0) - parseInt(a.querySelector('.leg-count')?.textContent||0))
    .forEach(r => panel.appendChild(r));
}

function updateRegionStats() {
  const regionMap = {};
  spotsData.forEach(s => {
    if (!regionMap[s.region]) regionMap[s.region] = {total:0, visited:0};
    regionMap[s.region].total++;
    if (visitedSet.has(s.id)) regionMap[s.region].visited++;
  });
  const panel = document.getElementById('legend-region-panel');
  panel.innerHTML = Object.entries(regionMap)
    .sort((a,b) => {
      const pa = a[1].visited/a[1].total, pb = b[1].visited/b[1].total;
      return pb !== pa ? pb - pa : a[0].localeCompare(b[0], 'ko');
    })
    .map(([name, d]) => {
      const pct = d.total ? Math.round(d.visited/d.total*100) : 0;
      const color = REGION_COLOR[name] || '#888';
      return `<div class="rg-row">
        <div class="rg-hdr">
          <span style="display:flex;align-items:center;gap:5px">
            <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block"></span>
            <span class="rg-name">${name}</span>
          </span>
          <span class="rg-pct">${d.visited}/${d.total} · ${pct}%</span>
        </div>
        <div class="rg-bar"><div class="rg-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    }).join('');
}

function openPanel(spot) {
  // 이전 선택 마커 복원
  if (lastSelectedId && lastSelectedId !== spot.id && markerMap[lastSelectedId]) {
    const prev = spotsData.find(x => x.id === lastSelectedId);
    if (prev) markerMap[lastSelectedId].setIcon(makeSpotIcon(prev, visitedSet.has(prev.id), false));
  }
  lastSelectedId = spot.id;
  if (markerMap[spot.id]) markerMap[spot.id].setIcon(makeSpotIcon(spot, visitedSet.has(spot.id), true));

  selectedSpot = spot;
  const v = visitedSet.has(spot.id);
  const col = CAT_COLOR[spot.category]||'#888';

  document.getElementById('panel-hero').style.background = col;

  const catEl = document.getElementById('panel-cat');
  catEl.textContent = (CAT_EMOJI[spot.category]||'') + ' ' + CAT_LABEL[spot.category];
  catEl.style.background = col;

  document.getElementById('panel-name').textContent = spot.name;
  document.getElementById('panel-region').textContent = '📌 ' + spot.region;
  document.getElementById('panel-desc').textContent = spot.description;
  document.getElementById('panel-map-open').href = `https://www.google.com/maps?q=${spot.lat},${spot.lng}`;

  // 근처 스팟 (가장 가까운 3개)
  const nearby = getNearbySpots(spot, 3);
  document.getElementById('nearby-list').innerHTML = nearby.map(n => {
    const nc = CAT_COLOR[n.category]||'#888';
    const nv = visitedSet.has(n.id) ? '✓ ' : '';
    return `<div class="nearby-item" data-id="${n.id}">
      <div class="nearby-dot" style="background:${nc}"></div>
      <span class="nearby-name">${nv}${n.name}</span>
      <span class="nearby-dist">${n.dist < 1 ? Math.round(n.dist*1000)+'m' : n.dist.toFixed(1)+'km'}</span>
    </div>`;
  }).join('');
  document.querySelectorAll('.nearby-item').forEach(el => {
    el.addEventListener('click', () => {
      const s = spotsData.find(x => x.id === el.dataset.id);
      if (s) { map.setView([s.lat, s.lng], Math.max(map.getZoom(), 11)); openPanel(s); }
    });
  });

  const stamp = document.getElementById('panel-stamp');
  stamp.innerHTML = v ? '<img src="assets/images/visit-stamp.png" alt="방문 완료">' : (CAT_EMOJI[spot.category]||'📍');
  stamp.style.setProperty('--stamp-color', col);
  stamp.className = v ? 'visited' : '';
  // 방문 시 팝 애니메이션
  if (v) { stamp.classList.remove('pop'); void stamp.offsetWidth; stamp.classList.add('pop'); }

  const btn = document.getElementById('panel-btn');
  if (btn.disabled) {
    // localhost: 버튼 상태 고정
  } else if (v) {
    btn.textContent = '✓ 방문 완료 (기록 취소)';
    btn.className = 'done';
    btn.style.background = col;
  } else {
    btn.textContent = '이곳에 발자국 남기기';
    btn.className = 'unvisited';
    btn.style.background = '';
  }

  document.getElementById('panel').classList.add('open');
  document.body.classList.add('panel-open');
}

function closePanel() {
  if (lastSelectedId && markerMap[lastSelectedId]) {
    const prev = spotsData.find(x => x.id === lastSelectedId);
    if (prev) markerMap[lastSelectedId].setIcon(makeSpotIcon(prev, visitedSet.has(prev.id), false));
  }
  lastSelectedId = null;
  document.getElementById('panel').classList.remove('open');
  document.body.classList.remove('panel-open');
  selectedSpot = null;
}

async function verifyOwner(callback) {
  const modal = document.getElementById('owner-modal');
  const pw = document.getElementById('owner-pw');
  const err = document.getElementById('owner-err');
  pw.value = ''; err.textContent = '';
  modal.classList.add('open');
  setTimeout(() => pw.focus(), 50);

  async function check() {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw.value));
    const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hash === OWNER_HASH) {
      modal.classList.remove('open');
      await callback();
    } else {
      err.textContent = '패스워드가 올바르지 않습니다';
      pw.value = ''; pw.focus();
    }
  }

  document.getElementById('owner-confirm').onclick = check;
  pw.onkeydown = e => {
    if (e.key === 'Enter') check();
    if (e.key === 'Escape') modal.classList.remove('open');
  };
  modal.onclick = e => { if (e.target === modal) modal.classList.remove('open'); };
}

async function toggleVisited() {
  if (!selectedSpot) return;
  const id = selectedSpot.id;
  const wasV = visitedSet.has(id);
  const token = localStorage.getItem('gh-token');

  if (!token) {
    alert('GitHub Token이 저장되어 있지 않아 방문 기록을 저장할 수 없습니다. 설정에서 토큰을 먼저 등록해 주세요.');
    document.getElementById('settings-btn').click();
    return;
  }

  const btn = document.getElementById('panel-btn');
  const previousVisited = new Set(visitedSet);
  btn.disabled = true;
  btn.style.opacity = '0.65';
  btn.textContent = wasV ? '방문 취소 저장 중...' : '방문 기록 저장 중...';

  wasV ? visitedSet.delete(id) : visitedSet.add(id);

  try {
    await syncGitHub(id, !wasV, token);
    renderSpots();
    updateStats();
    checkAchievements();
    btn.textContent = 'GitHub 저장 완료';
    btn.style.opacity = '';
    setTimeout(closePanel, 650);
  } catch(e) {
    visitedSet = previousVisited;
    renderSpots();
    updateStats();
    btn.disabled = false;
    btn.style.opacity = '';
    if (selectedSpot) openPanel(selectedSpot);
    alert('방문 기록을 GitHub에 저장하지 못했습니다. 토큰 권한(repo)과 네트워크 상태를 확인해 주세요.\n\n' + e.message);
  } finally {
    btn.disabled = false;
    btn.style.opacity = '';
  }
}

async function syncGitHub(spotId, visited, token) {
  // 개별 토글 시: 전체 목록을 Contents API로 즉시 업로드
  await pushVisitedToGitHub(token);
}

async function pushVisitedToGitHub(token, statusEl) {
  const FILE = 'data/visited-spots.json';
  const BASE = `https://api.github.com/repos/${REPO}/contents/${FILE}`;
  const headers = {
    'Authorization': 'token ' + token,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };

  // 현재 파일 SHA 가져오기
  const getRes = await fetch(BASE, { headers });
  if (!getRes.ok) {
    const detail = await getRes.text().catch(() => '');
    throw new Error('파일 조회 실패: ' + getRes.status + (detail ? ` ${detail}` : ''));
  }
  const { sha } = await getRes.json();

  // 새 내용 생성
  const today = new Date().toISOString().slice(0, 10);
  const content = JSON.stringify({ visited: [...visitedSet], lastUpdated: today }, null, 2);
  const encoded = btoa(unescape(encodeURIComponent(content)));

  // 파일 업데이트
  const putRes = await fetch(BASE, {
    method: 'PUT',
    headers,
    body: JSON.stringify({
      message: `방문 기록 동기화 (${[...visitedSet].length}개)`,
      content: encoded,
      sha
    })
  });
  if (!putRes.ok) {
    const detail = await putRes.text().catch(() => '');
    throw new Error('업로드 실패: ' + putRes.status + (detail ? ` ${detail}` : ''));
  }
  if (statusEl) statusEl.textContent = `✓ ${[...visitedSet].length}개 방문 기록이 GitHub에 저장되었습니다.`;
  if (statusEl) statusEl.style.color = 'var(--accent)';
}

// ─── 2단계 필터 데이터 ───
const THEME_BTNS = [
  {cat:'mountain',label:'⛰ 산/자연'},{cat:'beach',label:'🏖 해변'},
  {cat:'history',label:'🏯 역사/문화'},{cat:'city',label:'🏙 도시'},
  {cat:'island',label:'🏝 섬'},{cat:'nature',label:'🌿 자연'},
  {cat:'unique',label:'✨ 특별'},{cat:'hiking',label:'🥾 트래킹'},
  {cat:'theme',label:'🎢 놀이동산'},{cat:'resort',label:'🏨 리조트'},
  {cat:'park',label:'🌳 공원'},{cat:'temple',label:'🛕 사찰'},
  {cat:'museum',label:'🏛 박물관'}
];

function buildFL2(mode) {
  const fl2 = document.getElementById('fl2');
  if (mode === 'theme') {
    fl2.innerHTML = THEME_BTNS.map(t => {
      const col = CAT_COLOR[t.cat];
      return `<button class="fl2-btn${activeTheme===t.cat?' active':''}" data-cat="${t.cat}"
        style="${activeTheme===t.cat?`border-color:${col};color:${col};background:${col}18`:''}">${t.label}</button>`;
    }).join('');
    fl2.querySelectorAll('.fl2-btn').forEach(b => b.addEventListener('click', () => {
      activeTheme = b.dataset.cat;
      buildFL2('theme');
      closePanel(); renderSpots();
    }));
  } else if (mode === 'region') {
    const regions = [...new Set(spotsData.map(s => s.region))].sort((a,b) => a.localeCompare(b,'ko'));
    fl2.innerHTML = regions.map(r => {
      const col = REGION_COLOR[r]||'#888';
      return `<button class="fl2-btn${activeRegion===r?' active':''}" data-region="${r}"
        style="${activeRegion===r?`border-color:${col};color:${col};background:${col}18`:''}">${r}</button>`;
    }).join('');
    fl2.querySelectorAll('.fl2-btn').forEach(b => b.addEventListener('click', () => {
      activeRegion = activeRegion === b.dataset.region ? null : b.dataset.region;
      buildFL2('region');
      closePanel(); renderSpots();
    }));
  }
  fl2.classList.toggle('show', mode==='theme'||mode==='region');
}

function bindEvents() {
  // 1단계 필터
  document.querySelectorAll('.fl1-btn[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fl1-btn[data-mode]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const mode = btn.dataset.mode;
      if (mode === 'all') { activeTheme='all'; activeRegion=null; document.getElementById('fl2').classList.remove('show'); closePanel(); renderSpots(); }
      else buildFL2(mode);
    });
  });

  // 검색 토글
  const searchToggle = document.getElementById('search-toggle');
  const searchWrap = document.getElementById('search-wrap');
  searchToggle.addEventListener('click', () => {
    const open = searchWrap.classList.toggle('show');
    searchToggle.classList.toggle('active', open);
    if (open) { document.getElementById('fl2').classList.remove('show'); setTimeout(()=>document.getElementById('search-inp').focus(),50); }
  });

  // 검색 입력 (디바운스 + 키보드 탐색)
  let srTimeout, srFocusIdx = -1;
  const inp = document.getElementById('search-inp');
  const res = document.getElementById('search-res');

  function selectSearchResult(s) {
    res.innerHTML=''; inp.value='';
    searchWrap.classList.remove('show'); searchToggle.classList.remove('active');
    srFocusIdx = -1;
    if (markerMap[s.id]) {
      clusterGroup.zoomToShowLayer(markerMap[s.id], () => { map.flyTo([s.lat, s.lng], Math.max(map.getZoom(), 12), {duration:0.4}); openPanel(s); });
    } else {
      map.flyTo([s.lat, s.lng], 12, {duration:0.4}); openPanel(s);
    }
  }

  function renderSearchResults(q) {
    srFocusIdx = -1;
    if (!q) { res.innerHTML=''; return; }
    const results = fuseSearch.search(q).slice(0,8);
    if (!results.length) { res.innerHTML=`<div class="sr-item" style="color:var(--text2);cursor:default">검색 결과 없음</div>`; return; }
    res.innerHTML = results.map(r => {
      const s = r.item;
      const col = CAT_COLOR[s.category]||'#888';
      const v = visitedSet.has(s.id) ? ' ✓' : '';
      return `<div class="sr-item" data-id="${s.id}">
        <div class="sr-dot" style="background:${col}"></div>
        <div><div class="sr-name">${s.name}${v}</div><div class="sr-meta">${CAT_LABEL[s.category]} · ${s.region}</div></div>
      </div>`;
    }).join('');
    res.querySelectorAll('.sr-item[data-id]').forEach(el => {
      el.addEventListener('click', () => {
        const s = spotsData.find(x=>x.id===el.dataset.id);
        if (s) selectSearchResult(s);
      });
    });
  }

  inp.addEventListener('input', e => {
    clearTimeout(srTimeout);
    const q = e.target.value.trim();
    searchWrap.classList.toggle('has-text', q.length > 0);
    srTimeout = setTimeout(() => renderSearchResults(q), 150);
  });

  // 클리어 버튼
  const clearBtn = document.getElementById('search-clear');
  if (clearBtn) clearBtn.addEventListener('click', () => {
    inp.value = '';
    res.innerHTML = '';
    searchWrap.classList.remove('has-text');
    srFocusIdx = -1;
    inp.focus();
  });

  inp.addEventListener('keydown', e => {
    const items = res.querySelectorAll('.sr-item[data-id]');
    if (!items.length) { if (e.key==='Escape') { res.innerHTML=''; searchWrap.classList.remove('show'); searchToggle.classList.remove('active'); } return; }
    if (e.key==='ArrowDown') { e.preventDefault(); srFocusIdx=Math.min(srFocusIdx+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('focused',i===srFocusIdx)); }
    else if (e.key==='ArrowUp') { e.preventDefault(); srFocusIdx=Math.max(srFocusIdx-1,0); items.forEach((el,i)=>el.classList.toggle('focused',i===srFocusIdx)); }
    else if (e.key==='Enter' && srFocusIdx>=0) { const s=spotsData.find(x=>x.id===items[srFocusIdx].dataset.id); if(s) selectSearchResult(s); }
    else if (e.key==='Escape') { res.innerHTML=''; searchWrap.classList.remove('show'); searchToggle.classList.remove('active'); }
  });

  // 검색창 외부 클릭 닫기
  document.addEventListener('click', e => {
    if (!document.getElementById('filters').contains(e.target)) {
      document.getElementById('search-res').innerHTML='';
    }
  });

  document.getElementById('panel-close').addEventListener('click', closePanel);
  const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  if (isLocal) {
    const panelBtn = document.getElementById('panel-btn');
    panelBtn.disabled = true;
    panelBtn.textContent = '로컬에서는 사용 불가';
    panelBtn.style.opacity = '0.4';
    document.getElementById('settings-btn').style.display = 'none';
  } else {
    document.getElementById('panel-btn').addEventListener('click', () => verifyOwner(toggleVisited));
  }
  map.on('click', closePanel);

  document.getElementById('settings-btn').addEventListener('click', () => {
    const token = localStorage.getItem('gh-token')||'';
    document.getElementById('gh-token-input').value = token;
    document.getElementById('settings-note').textContent =
      token ? '✓ 토큰이 저장되어 자동 동기화 중입니다.' : '토큰 없이는 이 기기에만 저장됩니다.';
    document.getElementById('settings-overlay').classList.add('open');
  });

  document.getElementById('settings-save').addEventListener('click', () => {
    const t = document.getElementById('gh-token-input').value.trim();
    t ? localStorage.setItem('gh-token',t) : localStorage.removeItem('gh-token');
    document.getElementById('settings-overlay').classList.remove('open');
  });

  document.getElementById('settings-cancel').addEventListener('click', () => {
    document.getElementById('settings-overlay').classList.remove('open');
  });

  document.getElementById('settings-overlay').addEventListener('click', e => {
    if(e.target.id==='settings-overlay')
      document.getElementById('settings-overlay').classList.remove('open');
  });

}
