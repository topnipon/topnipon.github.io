<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대한민국 여행 지도 · 땡굴이의 발자국</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0d14;
  --surface:#0f1420;
  --surface2:#161d2e;
  --border:#1e2a3e;
  --border2:#2a3a54;
  --text:#e2e8f4;
  --text2:#8899b8;
  --accent:#f6ad55;
  --c-mountain:#34d399;
  --c-beach:#60a5fa;
  --c-history:#fbbf24;
  --c-city:#a78bfa;
  --c-island:#22d3ee;
  --c-nature:#86efac;
  --c-unique:#f472b6;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif}

/* 공통 상단 네비게이션 */
#topnav{
  position:fixed;top:0;left:0;right:0;z-index:1000;height:57px;
  background:rgba(10,13,20,0.94);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:0;
}
#nav-brand{
  font-size:0.92rem;font-weight:800;color:var(--accent);
  white-space:nowrap;letter-spacing:.5px;margin-right:20px;flex-shrink:0;
}
#nav-tabs{display:flex;gap:4px;align-items:center}
.nav-tab{
  font-size:0.75rem;padding:6px 16px;border-radius:20px;
  text-decoration:none;color:var(--text2);border:1px solid transparent;
  transition:all .2s;white-space:nowrap;
}
.nav-tab:hover{color:var(--text);border-color:var(--border2)}
.nav-tab.active{
  background:rgba(246,173,85,0.12);border-color:var(--accent);
  color:var(--accent);font-weight:700;
}
#nav-right{display:flex;align-items:center;gap:16px;margin-left:auto;flex:1;max-width:420px}
#hd-prog{width:100%}
#prog-nums{display:flex;justify-content:space-between;font-size:0.7rem;margin-bottom:5px}
#prog-visited{color:var(--accent);font-weight:700}
#prog-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#f6d55f);border-radius:2px;transition:width .6s ease;width:0%}
@media(max-width:640px){#hd-prog{display:none}#nav-brand{font-size:0.82rem;margin-right:12px}}

/* 지도 */
#map{position:fixed;top:57px;left:0;right:0;bottom:0}
.leaflet-tile{filter:brightness(0.85) saturate(0.6)}
.leaflet-control-zoom{display:none}
.leaflet-control-attribution{display:none}

/* 필터 바 */
#filters{
  position:fixed;top:69px;left:50%;transform:translateX(-50%);z-index:900;
  display:flex;gap:6px;padding:8px 14px;
  background:rgba(10,13,20,0.9);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:30px;
}
.f-btn{
  font-size:0.68rem;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;
}
.f-btn:hover{color:var(--text);border-color:var(--text2)}
.f-btn.active{border-color:var(--accent);color:var(--accent);font-weight:700}
.f-btn[data-cat=mountain].active{border-color:var(--c-mountain);color:var(--c-mountain)}
.f-btn[data-cat=beach].active{border-color:var(--c-beach);color:var(--c-beach)}
.f-btn[data-cat=history].active{border-color:var(--c-history);color:var(--c-history)}
.f-btn[data-cat=city].active{border-color:var(--c-city);color:var(--c-city)}
.f-btn[data-cat=island].active{border-color:var(--c-island);color:var(--c-island)}
.f-btn[data-cat=nature].active{border-color:var(--c-nature);color:var(--c-nature)}
.f-btn[data-cat=unique].active{border-color:var(--c-unique);color:var(--c-unique)}

/* 범례 */
#legend{
  position:fixed;bottom:24px;left:20px;z-index:900;
  background:rgba(10,13,20,0.88);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:12px;padding:12px 14px;
  display:flex;flex-direction:column;gap:5px;min-width:110px;
}
#legend-title{font-size:0.62rem;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.leg-row{display:flex;align-items:center;gap:7px;font-size:0.7rem;color:var(--text2)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* 스팟 상세 패널 */
#panel{
  position:fixed;top:57px;right:0;bottom:0;width:300px;z-index:950;
  background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
#panel.open{transform:translateX(0)}
#panel-close{
  position:absolute;top:14px;right:14px;background:transparent;border:none;
  color:var(--text2);font-size:1.1rem;cursor:pointer;padding:4px;line-height:1;
}
#panel-close:hover{color:var(--text)}
#panel-body{padding:22px 20px 24px;overflow-y:auto;flex:1}
#panel-cat{
  display:inline-block;font-size:0.63rem;letter-spacing:2px;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;font-weight:700;color:#0a0d14;margin-bottom:14px;
}
#panel-name{font-size:1.35rem;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:4px}
#panel-region{font-size:0.73rem;color:var(--text2);margin-bottom:14px}
#panel-desc{font-size:0.8rem;color:var(--text2);line-height:1.65;margin-bottom:28px}
#panel-stamp{
  width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;margin:0 auto 20px;border:3px solid var(--border2);background:var(--surface2);
  transition:all .4s ease;
}
#panel-stamp.visited{border-color:var(--stamp-color);box-shadow:0 0 28px var(--stamp-color)}
#panel-btn{
  display:block;width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;
  font-size:0.85rem;font-weight:700;letter-spacing:.5px;transition:all .25s;
}
#panel-btn.unvisited{
  background:var(--surface2);border:1px solid var(--border2);color:var(--text2);
}
#panel-btn.unvisited:hover{border-color:var(--accent);color:var(--accent)}
#panel-btn.done{color:#0a0d14;font-weight:800}

/* 설정 버튼 */
#settings-btn{
  position:fixed;bottom:24px;right:24px;z-index:900;width:42px;height:42px;
  border-radius:50%;background:var(--surface2);border:1px solid var(--border2);
  color:var(--text2);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
#settings-btn:hover{border-color:var(--accent);color:var(--accent)}

/* 설정 모달 */
#settings-overlay{
  position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);
  display:none;align-items:center;justify-content:center;
}
#settings-overlay.open{display:flex}
#settings-box{
  background:var(--surface);border:1px solid var(--border2);border-radius:16px;
  padding:28px 28px 24px;width:360px;max-width:90vw;
}
#settings-box h3{font-size:1rem;font-weight:700;margin-bottom:8px}
#settings-box .s-desc{font-size:0.75rem;color:var(--text2);margin-bottom:18px;line-height:1.6}
#settings-box label{font-size:0.72rem;color:var(--text2);display:block;margin-bottom:6px}
#settings-box input{
  width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-size:0.82rem;outline:none;
}
#settings-box input:focus{border-color:var(--accent)}
#settings-actions{display:flex;gap:8px;margin-top:16px}
#settings-save{
  flex:1;padding:10px;background:var(--accent);border:none;border-radius:8px;
  color:#0a0d14;font-weight:700;cursor:pointer;font-size:0.82rem;
}
#settings-cancel{
  padding:10px 16px;background:transparent;border:1px solid var(--border2);
  border-radius:8px;color:var(--text2);cursor:pointer;font-size:0.82rem;
}
#settings-note{font-size:0.7rem;color:var(--text2);margin-top:12px;line-height:1.5}

/* 툴팁 */
.spot-tip{
  background:rgba(10,13,20,0.95)!important;border:1px solid var(--border2)!important;
  border-radius:8px!important;padding:7px 11px!important;color:var(--text)!important;
  font-size:0.75rem!important;box-shadow:0 4px 16px rgba(0,0,0,.5)!important;
}
.spot-tip::before{display:none!important}
.spot-tip b{display:block;font-size:0.82rem;margin-bottom:2px}
.spot-tip small{color:var(--text2)}

/* 모바일 */
@media(max-width:640px){
  #filters{
    top:auto;bottom:70px;left:10px;right:10px;transform:none;
    overflow-x:auto;border-radius:14px;justify-content:flex-start;
  }
  #panel{
    width:100%;top:auto;height:72vh;bottom:0;left:0;right:0;
    border-left:none;border-top:1px solid var(--border);
    border-radius:16px 16px 0 0;
    transform:translateY(100%);
  }
  #panel.open{transform:translateY(0)}
  #legend{display:none}
}
</style>
</head>
<body>

<!-- 공통 네비게이션 -->
<nav id="topnav">
  <div id="nav-brand">땡굴이의 발자국</div>
  <div id="nav-tabs">
    <a href="index.html" class="nav-tab active">🗺 여행 지도</a>
    <a href="index_1.html" class="nav-tab">🚶 걷기 기록</a>
  </div>
  <div id="nav-right">
    <div id="hd-prog">
      <div id="prog-nums">
        <span><span id="prog-visited">0</span> <span style="color:var(--text2)">/ <span id="prog-total">0</span> 방문</span></span>
        <span id="prog-pct">0%</span>
      </div>
      <div id="prog-bar"><div id="prog-fill"></div></div>
    </div>
  </div>
</nav>

<!-- 필터 -->
<div id="filters">
  <button class="f-btn active" data-cat="all">전체</button>
  <button class="f-btn" data-cat="mountain">산/자연</button>
  <button class="f-btn" data-cat="beach">해변</button>
  <button class="f-btn" data-cat="history">역사/문화</button>
  <button class="f-btn" data-cat="city">도시</button>
  <button class="f-btn" data-cat="island">섬</button>
  <button class="f-btn" data-cat="nature">자연</button>
  <button class="f-btn" data-cat="unique">특별</button>
</div>

<!-- 지도 -->
<div id="map"></div>

<!-- 범례 -->
<div id="legend">
  <div id="legend-title">카테고리</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--c-mountain)"></div>산/자연</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--c-beach)"></div>해변</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--c-history)"></div>역사/문화</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--c-city)"></div>도시</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--c-island)"></div>섬</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--c-nature)"></div>자연</div>
  <div class="leg-row"><div class="leg-dot" style="background:var(--c-unique)"></div>특별</div>
</div>

<!-- 스팟 패널 -->
<div id="panel">
  <button id="panel-close">✕</button>
  <div id="panel-body">
    <div id="panel-cat"></div>
    <div id="panel-name"></div>
    <div id="panel-region"></div>
    <div id="panel-desc"></div>
    <div id="panel-stamp">📍</div>
    <button id="panel-btn" class="unvisited">여기 다녀왔어요!</button>
  </div>
</div>

<!-- 설정 버튼 -->
<button id="settings-btn" title="설정">⚙</button>

<!-- 설정 모달 -->
<div id="settings-overlay">
  <div id="settings-box">
    <h3>⚙ GitHub 동기화 설정</h3>
    <div class="s-desc">
      GitHub Personal Access Token을 저장하면 방문 기록이 자동으로 GitHub에 동기화됩니다.
      토큰은 이 브라우저에만 저장됩니다.
    </div>
    <label>Personal Access Token (repo 권한 필요)</label>
    <input id="gh-token-input" type="password" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off"/>
    <div id="settings-note"></div>
    <div id="settings-actions">
      <button id="settings-save">저장</button>
      <button id="settings-cancel">취소</button>
    </div>
  </div>
</div>

  {"id":"ul-bangudae","name":"반구대 암각화","region":"울산","lat":35.6047,"lng":129.1595,"radius":2000,"category":"history","description":"세계 최초 고래잡이 기록. 7000년 전 선사인의 암벽 그림"},
  {"id":"jj-hallasan","name":"한라산","region":"제주","lat":33.3617,"lng":126.5292,"radius":12000,"category":"mountain","description":"남한 최고봉(1950m). 백록담 분화구와 계절별 꽃밭이 압도적"},
  {"id":"jj-seongsan","name":"성산일출봉","region":"제주","lat":33.4588,"lng":126.9423,"radius":2500,"category":"nature","description":"유네스코 세계자연유산. 바다에서 솟은 수성화산 분화구"},
  {"id":"jj-manjanggul","name":"만장굴","region":"제주","lat":33.5278,"lng":126.7702,"radius":2000,"category":"nature","description":"유네스코 세계자연유산. 세계 최장 용암동굴 중 하나"},
  {"id":"jj-cheonjiyeon","name":"천지연폭포","region":"제주","lat":33.2467,"lng":126.5590,"radius":1500,"category":"nature","description":"높이 22m 제주 최대 폭포. 밤에도 열리는 야간 조명이 낭만적"},
  {"id":"jj-seopjikoji","name":"섭지코지","region":"제주","lat":33.4338,"lng":126.9218,"radius":2000,"category":"nature","description":"유채꽃·억새가 넘실대는 해안 돌출부. 유리의 성 건축물이 이색적"},
  {"id":"jj-hyeopjae","name":"협재해수욕장","region":"제주","lat":33.3946,"lng":126.2396,"radius":2000,"category":"beach","description":"에메랄드빛 투명한 물과 흰 모래. 제주에서 가장 아름다운 해수욕장"},

  {"id":"jj-yongduam","name":"용두암","region":"제주","lat":33.5162,"lng":126.5089,"radius":1000,"category":"nature","description":"용이 하늘로 승천하다 굳어버린 10m 해안 기암"},
  {"id":"jj-oreum","name":"새별오름","region":"제주","lat":33.4012,"lng":126.3221,"radius":2000,"category":"mountain","description":"억새밭 오름. 정월대보름 들불축제 개최지이자 사진 명소"},
  {"id":"jj-sangumburi","name":"산굼부리","region":"제주","lat":33.4484,"lng":126.7267,"radius":1500,"category":"nature","description":"천연기념물 수직 화구. 가을 억새밭이 황금빛으로 출렁인다"}
];

let spotsData = [], visitedSet = new Set();
let activeFilter = 'all', circles = {}, selectedSpot = null, map;

async function init() {
  const KR_BOUNDS = L.latLngBounds([33.0, 124.5], [38.65, 132.2]);
  const KR_FIT    = L.latLngBounds([33.1, 125.8], [38.5, 129.6]);
  map = L.map('map', {
    zoomControl:false, attributionControl:false,
    maxBounds: KR_BOUNDS,
    maxBoundsViscosity: 1.0,
    minZoom: 8
  });
  map.fitBounds(KR_FIT, {padding:[10,10]});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {subdomains:'abcd', maxZoom:19}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);

  // 스팟 데이터는 인라인 — 항상 동작
  spotsData = SPOTS_INLINE;

  // 방문 기록: 서버/GitHub Pages에서만 fetch 시도, 실패하면 localStorage만 사용
  try {
    if (location.protocol !== 'file:') {
      const vr = await fetch('data/visited-spots.json?v='+Date.now());
      const vd = await vr.json();
      (vd.visited || []).forEach(id => visitedSet.add(id));
    }
  } catch(e) {}

  const local = JSON.parse(localStorage.getItem('visited-spots')||'[]');
  local.forEach(id => visitedSet.add(id));

  renderSpots();
  updateStats();
  bindEvents();
}

function spotRadius(spot) {
  // 중요도/크기에 따라 픽셀 반지름 차등
  if (spot.radius >= 12000) return 22;
  if (spot.radius >= 8000)  return 18;
  if (spot.radius >= 5000)  return 15;
  if (spot.radius >= 3000)  return 12;
  if (spot.radius >= 1500)  return 10;
  return 8;
}

function renderSpots() {
  Object.values(circles).forEach(c => map.removeLayer(c));
  circles = {};
  spotsData.forEach(spot => {
    if (activeFilter !== 'all' && spot.category !== activeFilter) return;
    const v = visitedSet.has(spot.id);
    const col = CAT_COLOR[spot.category]||'#888';
    const r = spotRadius(spot);
    const c = L.circleMarker([spot.lat, spot.lng], {
      radius: r,
      fillColor: v ? col : '#1a2540',
      fillOpacity: v ? 0.75 : 0.35,
      color: v ? col : '#3a4f70',
      weight: v ? 2.5 : 1.5,
      dashArray: v ? null : '4 3'
    }).addTo(map);
    c.bindTooltip(
      `<b>${spot.name}</b><small>${CAT_LABEL[spot.category]} · ${spot.region}</small>`,
      {direction:'top', sticky:true, className:'spot-tip', offset:[0,-4]}
    );
    c.on('click', e => { L.DomEvent.stopPropagation(e); openPanel(spot); });
    circles[spot.id] = c;
  });
}

function updateStats() {
  const total = spotsData.length;
  const n = visitedSet.size;
  const pct = total ? Math.round(n/total*100) : 0;
  document.getElementById('prog-visited').textContent = n;
  document.getElementById('prog-total').textContent = total;
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';
}

function openPanel(spot) {
  selectedSpot = spot;
  const v = visitedSet.has(spot.id);
  const col = CAT_COLOR[spot.category]||'#888';

  const catEl = document.getElementById('panel-cat');
  catEl.textContent = CAT_LABEL[spot.category];
  catEl.style.background = col;

  document.getElementById('panel-name').textContent = spot.name;
  document.getElementById('panel-region').textContent = '📌 '+spot.region;
  document.getElementById('panel-desc').textContent = spot.description;

  const stamp = document.getElementById('panel-stamp');
  stamp.textContent = CAT_EMOJI[spot.category]||'📍';
  stamp.style.setProperty('--stamp-color', col);
  stamp.className = v ? 'visited' : '';

  const btn = document.getElementById('panel-btn');
  if (v) {
    btn.textContent = '✓ 방문 완료 (기록 취소)';
    btn.className = 'done';
    btn.style.background = col;
  } else {
    btn.textContent = '여기 다녀왔어요!';
    btn.className = 'unvisited';
    btn.style.background = '';
  }

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  selectedSpot = null;
}

async function toggleVisited() {
  if (!selectedSpot) return;
  const id = selectedSpot.id;
  const wasV = visitedSet.has(id);
  wasV ? visitedSet.delete(id) : visitedSet.add(id);
  localStorage.setItem('visited-spots', JSON.stringify([...visitedSet]));

  const token = localStorage.getItem('gh-token');
  if (token) syncGitHub(id, !wasV, token);

  renderSpots();
  updateStats();
  closePanel();
}

async function syncGitHub(spotId, visited, token) {
  try {
    await fetch(`https://api.github.com/repos/${REPO}/dispatches`, {
      method:'POST',
      headers:{
        'Authorization':'token '+token,
        'Accept':'application/vnd.github.v3+json',
        'Content-Type':'application/json'
      },
      body: JSON.stringify({
        event_type:'update-visited',
        client_payload:{spotId, visited:visited.toString()}
      })
    });
  } catch(e) { console.warn('GitHub sync 실패:', e); }
}

function bindEvents() {
  document.querySelectorAll('.f-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.cat;
      closePanel();
      renderSpots();
    });
  });

  document.getElementById('panel-close').addEventListener('click', closePanel);
  document.getElementById('panel-btn').addEventListener('click', toggleVisited);
  map.on('click', closePanel);

  document.getElementById('settings-btn').addEventListener('click', () => {
    const token = localStorage.getItem('gh-token')||'';
    document.getElementById('gh-token-input').value = token;
    document.getElementById('settings-note').textContent =
      token ? '✓ 토큰이 저장되어 자동 동기화 중입니다.' : '토큰 없이는 이 기기에만 저장됩니다.';
    document.getElementById('settings-overlay').classList.add('open');
  });

  document.getElementById('settings-save').addEventListener('click', () => {
    const t = document.getElementById('gh-token-input').value.trim();
    t ? localStorage.setItem('gh-token',t) : localStorage.removeItem('gh-token');
    document.getElementById('settings-overlay').classList.remove('open');
  });

  document.getElementById('settings-cancel').addEventListener('click', () => {
    document.getElementById('settings-overlay').classList.remove('open');
  });

  document.getElementById('settings-overlay').addEventListener('click', e => {
    if(e.target.id==='settings-overlay')
      document.getElementById('settings-overlay').classList.remove('open');
  });
}

init();
</script>
