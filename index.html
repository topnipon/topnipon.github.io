<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 걷기 기록</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',sans-serif;min-height:100vh}

/* 헤더 */
#header{padding:32px 40px 0}
#title{font-size:1.1rem;color:#8b949e;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
#subtitle{font-size:2rem;font-weight:700;color:#fff;margin-bottom:28px}

/* 스탯 카드 */
#stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:32px}
.sc{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px 24px;flex:1;min-width:140px}
.sc-val{font-size:2rem;font-weight:800;color:#f6ad55}
.sc-lbl{font-size:0.72rem;color:#8b949e;margin-top:4px;letter-spacing:2px;text-transform:uppercase}

/* 컨텐츠 */
#content{padding:0 40px 60px;display:flex;flex-direction:column;gap:24px}
.section-label{font-size:0.72rem;color:#8b949e;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}

/* 2열 그리드 - 동일 높이 */
#grid-bottom{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:stretch}
#grid-bottom>div{display:flex;flex-direction:column}
#grid-bottom .chart-wrap{flex:1}

/* 푸터 */
#footer{background:#161b22;border-top:1px solid #30363d;padding:40px;margin-top:8px}
#footer-inner{max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:32px}
.ft-block{}
.ft-label{font-size:0.68rem;color:#8b949e;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.ft-val{font-size:1.1rem;color:#f6ad55;font-weight:700;margin-bottom:4px}
.ft-desc{font-size:0.8rem;color:#8b949e;line-height:1.6}
#footer-copy{text-align:center;margin-top:32px;font-size:0.72rem;color:#484f58;border-top:1px solid #21262d;padding-top:20px}

/* 히트맵 */
#heatmap-wrap{overflow-x:auto;padding-bottom:12px}
#heatmap-svg{display:block}
.hm-month{font-size:11px;fill:#8b949e}
.hm-day{font-size:10px;fill:#8b949e}
.hm-cell{rx:3;ry:3;cursor:pointer;transition:opacity .15s}
.hm-cell:hover{opacity:0.75}
#hm-legend{display:flex;align-items:center;gap:8px;margin-top:16px;font-size:11px;color:#8b949e}
.leg-cell{width:13px;height:13px;border-radius:3px;display:inline-block}

/* 툴팁 */
#tooltip{position:fixed;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:8px 12px;font-size:12px;color:#c9d1d9;pointer-events:none;opacity:0;transition:opacity .15s;z-index:100}
#tt-date{font-weight:600;margin-bottom:2px}
#tt-km{color:#f6ad55}

/* 차트 래퍼 */
.chart-wrap{position:relative;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px}
.chart-title{font-size:0.75rem;color:#8b949e;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}

/* 마일스톤 배지 */
#milestones{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
.ms{background:#161b22;border:1px solid #30363d;border-radius:20px;padding:6px 14px;font-size:0.75rem;color:#8b949e}
.ms.reached{border-color:#f6ad55;color:#f6ad55}

/* 요일 그리드 */
#wd-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-top:8px}
.wd-bar-wrap{text-align:center}
.wd-label{font-size:0.72rem;color:#8b949e;margin-bottom:6px}
.wd-bar-bg{background:#21262d;border-radius:6px;height:160px;display:flex;align-items:flex-end;overflow:hidden}
.wd-bar-fill{width:100%;border-radius:6px 6px 0 0;transition:height 1s cubic-bezier(.4,0,.2,1)}
.wd-val{font-size:0.78rem;color:#f6ad55;margin-top:6px;font-weight:600}
</style>
</head>
<body>

<div id="tooltip"><div id="tt-date"></div><div id="tt-km"></div></div>

<div id="header">
  <div id="title">My Walking Record · 2025.05 – 2026.05</div>
  <div id="subtitle">땡굴이의 걷기 기록</div>
  <div id="stats">
    <div class="sc"><div class="sc-val" id="s-total">0</div><div class="sc-lbl">Total km</div></div>
    <div class="sc"><div class="sc-val" id="s-days">0</div><div class="sc-lbl">기록된 날</div></div>
    <div class="sc"><div class="sc-val" id="s-avg">0</div><div class="sc-lbl">일평균 km</div></div>
    <div class="sc"><div class="sc-val" id="s-max">0</div><div class="sc-lbl">최장 하루</div></div>
  </div>
</div>

<div id="content">

  <!-- 히트맵 (전체 너비) -->
  <div>
    <div class="section-label">🗓 캘린더 히트맵</div>
    <div class="chart-wrap">
      <div id="heatmap-wrap"><svg id="heatmap-svg"></svg></div>
      <div id="hm-legend">
        <span>적음</span>
        <span class="leg-cell" style="background:#161b22;border:1px solid #30363d"></span>
        <span class="leg-cell" style="background:#3d1f00"></span>
        <span class="leg-cell" style="background:#7a3b00"></span>
        <span class="leg-cell" style="background:#c46200"></span>
        <span class="leg-cell" style="background:#f6a000"></span>
        <span class="leg-cell" style="background:#ffd060"></span>
        <span>많음</span>
      </div>
    </div>
  </div>

  <!-- 누적 라인 (전체 너비) -->
  <div>
    <div class="section-label">📈 누적 거리</div>
    <div class="chart-wrap">
      <canvas id="chart-journey" height="120"></canvas>
    </div>
    <div id="milestones"></div>
  </div>

  <!-- 월별 + 요일 (2열) -->
  <div id="grid-bottom">
    <div>
      <div class="section-label">📊 월별 총 거리</div>
      <div class="chart-wrap">
        <canvas id="chart-monthly"></canvas>
      </div>
    </div>
    <div>
      <div class="section-label">📅 요일별 평균</div>
      <div class="chart-wrap">
        <div id="wd-grid"></div>
      </div>
    </div>
  </div>

</div>

<footer id="footer">
  <div id="footer-inner">
    <div class="ft-block">
      <div class="ft-label">기록 기간</div>
      <div class="ft-val">2025.05 – 2026.05</div>
      <div class="ft-desc">1년간의 걷기 데이터를 기반으로 작성되었습니다.</div>
    </div>
    <div class="ft-block">
      <div class="ft-label">등가 거리</div>
      <div class="ft-val" id="ft-equiv">—</div>
      <div class="ft-desc" id="ft-equiv-desc">—</div>
    </div>
    <div class="ft-block">
      <div class="ft-label">Best Record</div>
      <div class="ft-val" id="ft-best">—</div>
      <div class="ft-desc" id="ft-best-desc">—</div>
    </div>
  </div>
  <div id="footer-copy" id="ft-copy">—</div>
</footer>

function animateCounter(el, target, decimals, suffix) {
  let start = 0, dur = 1200, begin = null;
  function step(ts) {
    if(!begin) begin = ts;
    const p = Math.min((ts-begin)/dur, 1);
    const ease = 1-Math.pow(1-p,3);
    const val = (start+(target-start)*ease).toFixed(decimals);
    el.textContent = Number(val).toLocaleString('ko-KR') + (suffix||'');

  const end = new Date('2026-05-06T00:00:00');

  let cur = new Date(start);
  while(cur<=end) {
    const week=[];
    for(let d=0;d<7;d++) {
      const iso = cur.toISOString().slice(0,10);
      week.push({ date:iso, km:dayMap[iso]||0, d:new Date(cur) });
      cur.setDate(cur.getDate()+1);
    }
    weeks.push(week);
  }

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // 요일 레이블 (월~일)
  ['월','화','수','목','금','토','일'].forEach((lbl,i)=>{
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',8);
    t.setAttribute('y',38+i*STEP+CELL*0.75);
    t.setAttribute('class','hm-day');
    t.textContent=i%2===0?lbl:'';
    svg.appendChild(t);
  });

  // 월 레이블 + 셀
  let lastMonth = '';
  weeks.forEach((week,wi)=>{
    const firstDate = week.find(d=>d.km>0||true);
    const month = week[0].d.toLocaleDateString('ko-KR',{month:'short'});
    const curMonth = week[0].d.toISOString().slice(0,7);
    if(curMonth!==lastMonth) {
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', 30+wi*STEP);
      t.setAttribute('y', 22);
      t.setAttribute('class','hm-month');
      t.textContent = month;
      svg.appendChild(t);
      lastMonth=curMonth;
    }
    week.forEach((day,di)=>{
      const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x', 30+wi*STEP);
      rect.setAttribute('y', 30+di*STEP);
      rect.setAttribute('width', CELL);
      rect.setAttribute('height', CELL);
      rect.setAttribute('rx', 3);
      rect.setAttribute('fill', kmColor(day.km));
      rect.setAttribute('class','hm-cell');

      rect.addEventListener('mousemove', e=>{
        tooltip.style.opacity=1;
        tooltip.style.left=(e.clientX+12)+'px';
        tooltip.style.top=(e.clientY-36)+'px';
        document.getElementById('tt-date').textContent=day.date;
        document.getElementById('tt-km').textContent=day.km>0?day.km.toFixed(1)+' km':'기록 없음';
      });
      rect.addEventListener('mouseleave',()=>{ tooltip.style.opacity=0; });
      svg.appendChild(rect);
    });
  });
}

// ── 차트 (월별 바) ──────────────────────────────────────────────────
let chartMonthly=null, chartJourney=null;

function buildMonthly() {
  if(chartMonthly) return;
  const ctx=document.getElementById('chart-monthly').getContext('2d');
  chartMonthly=new Chart(ctx,{
    type:'bar',
    data:{
      labels:MONTH_LABELS,
      datasets:[{
        data:MONTH_VALS,
        backgroundColor: MONTH_VALS.map(v=>{
          const max=Math.max(...MONTH_VALS);
          const ratio=v/max;
          return `rgba(246,${Math.round(100+ratio*100)},${Math.round(ratio*20)},${0.5+ratio*0.5})`;
        }),
        borderColor:'rgba(246,173,85,0.3)',
        borderWidth:1,
        borderRadius:6,
      }]
    },
    options:{
      indexAxis:'y',
      animation:{duration:800,easing:'easeOutQuart'},
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{label:ctx=>`  ${ctx.raw} km`},
          backgroundColor:'#1c2128',
          borderColor:'#30363d',
          borderWidth:1,
          titleColor:'#c9d1d9',
          bodyColor:'#f6ad55',
        }
      },
      scales:{
        x:{
          grid:{color:'rgba(255,255,255,0.05)'},
          ticks:{color:'#8b949e'},
        },
        y:{
          grid:{display:false},
          ticks:{color:'#c9d1d9',font:{size:11}},
        }
      }
    }
  });
}

// ── 차트 (누적 라인) ─────────────────────────────────────────────────
function buildJourney() {
  if(chartJourney) return;
  const ctx=document.getElementById('chart-journey').getContext('2d');
  const grad=ctx.createLinearGradient(0,0,0,350);
  grad.addColorStop(0,'rgba(246,173,85,0.4)');
  grad.addColorStop(1,'rgba(246,173,85,0)');

  const labels=DAYS.map(d=>d.date);
  const vals=DAYS.map(d=>Math.round(d.cumKm));

  chartJourney=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[{
        data:vals,
        borderColor:'#f6ad55',
        borderWidth:2,
        backgroundColor:grad,
        fill:true,
        pointRadius:0,
        pointHoverRadius:5,
        pointHoverBackgroundColor:'#f6ad55',
        tension:0.3,
      }]
    },
    options:{
      animation:{duration:1000,easing:'easeOutQuart'},
      plugins:{
        legend:{display:false},
        tooltip:{
          mode:'index',intersect:false,
          callbacks:{
            title:ctx=>ctx[0].label,
            label:ctx=>`  누적 ${ctx.raw.toLocaleString()} km`
          },
          backgroundColor:'#1c2128',
          borderColor:'#30363d',
          borderWidth:1,
          titleColor:'#c9d1d9',
          bodyColor:'#f6ad55',
        }
      },
      scales:{
        x:{
          grid:{color:'rgba(255,255,255,0.04)'},
          ticks:{
            color:'#8b949e',font:{size:10},
            maxTicksLimit:13,
            maxRotation:0,
          }
        },
        y:{
          grid:{color:'rgba(255,255,255,0.04)'},
          ticks:{color:'#8b949e',callback:v=>v.toLocaleString()+'km'}
        }
      }
    }
  });

  // 마일스톤
  const total=Math.round(TOTAL);
  const ms=document.getElementById('milestones');
  [500,1000,1500,2000,2500,3000,3500,4000].forEach(m=>{
    const el=document.createElement('div');
    el.className='ms'+(total>=m?' reached':'');
    const day=DAYS.find(d=>Math.round(d.cumKm)>=m);
    el.textContent=total>=m?`✓ ${m.toLocaleString()}km · ${day?day.date:''}`:`${m.toLocaleString()}km`;
    ms.appendChild(el);
  });
}

// ── 요일 바 차트 (커스텀) ────────────────────────────────────────────
function buildWeekday() {
  const grid=document.getElementById('wd-grid');
  if(grid.children.length>0) return;
  const maxAvg=Math.max(...WD_AVG);
  WD_LABELS.forEach((lbl,i)=>{
    const wrap=document.createElement('div');
    wrap.className='wd-bar-wrap';
    const pct=maxAvg>0?(WD_AVG[i]/maxAvg*100):0;
    wrap.innerHTML=`
      <div class="wd-label">${lbl}</div>
      <div class="wd-bar-bg">
        <div class="wd-bar-fill" style="height:0%;background:${WD_COLORS[i]}" data-pct="${pct}"></div>
      </div>
      <div class="wd-val">${WD_AVG[i]}km</div>`;
    grid.appendChild(wrap);
  });
  setTimeout(()=>{
    grid.querySelectorAll('.wd-bar-fill').forEach(el=>{
      el.style.height=el.dataset.pct+'%';
    });
  },50);
}

// 전체 즉시 렌더링
buildHeatmap();
buildMonthly();
buildJourney();
buildWeekday();

// ── 푸터 ────────────────────────────────────────────────────────────
(function buildFooter() {
  const totalKm = Math.round(TOTAL);
  const sbRound = (totalKm / 400).toFixed(1);
  const earthPct = (totalKm / 40075 * 100).toFixed(1);

  // 등가 거리
  document.getElementById('ft-equiv').textContent = `서울↔부산 ${sbRound}회`;
  document.getElementById('ft-equiv-desc').textContent =
    `총 ${totalKm.toLocaleString('ko-KR')}km — 지구 한 바퀴의 ${earthPct}%에 해당하는 거리입니다.`;

  // 베스트 기록
  const bestMonth = MONTHS.reduce((a,b)=>b[1]>a[1]?b:a);
  const [bmy, bmm] = bestMonth[0].split('-');
  const maxAvg = Math.max(...WD_AVG.map(Number));
  const bestWdIdx = WD_AVG.findIndex(v => Number(v) === maxAvg);
  document.getElementById('ft-best').textContent =
    `${bmy}.${bmm} · ${Math.round(bestMonth[1]).toLocaleString('ko-KR')}km`;
  document.getElementById('ft-best-desc').textContent =
    `가장 많이 걸은 달입니다. 요일 기준으로는 ${WD_LABELS[bestWdIdx]}요일 평균 ${WD_AVG[bestWdIdx]}km로 가장 활발했습니다.`;

  // 카피라이트
  document.getElementById('footer-copy').textContent =
    `${DAYS.length}일간의 기록 · 총 ${totalKm.toLocaleString('ko-KR')}km · 일평균 ${AVG}km · 데이터 출처: Apple Health`;
})();
</script>
